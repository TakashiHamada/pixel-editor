<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Photoshop-style precision crosshair cursor -->
  <!-- Shadow -->
  <g transform="translate(0.6, 0.6)" opacity="0.3">
    <!-- Vertical line -->
    <line x1="10" y1="1" x2="10" y2="7" stroke="#000" stroke-width="2"/>
    <line x1="10" y1="13" x2="10" y2="19" stroke="#000" stroke-width="2"/>
    <!-- Horizontal line -->
    <line x1="1" y1="10" x2="7" y2="10" stroke="#000" stroke-width="2"/>
    <line x1="13" y1="10" x2="19" y2="10" stroke="#000" stroke-width="2"/>
    <!-- Center dot -->
    <circle cx="10" cy="10" r="1.5" fill="#000"/>
  </g>
  <!-- Main crosshair (white with dark outline) -->
  <!-- Vertical lines -->
  <line x1="10" y1="1" x2="10" y2="7" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="10" y1="13" x2="10" y2="19" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="10" y1="1.5" x2="10" y2="6.5" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="10" y1="13.5" x2="10" y2="18.5" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <!-- Horizontal lines -->
  <line x1="1" y1="10" x2="7" y2="10" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="13" y1="10" x2="19" y2="10" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="1.5" y1="10" x2="6.5" y2="10" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="13.5" y1="10" x2="18.5" y2="10" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="10" cy="10" r="1.2" fill="#e44" stroke="#222" stroke-width="0.6"/>
</svg>
