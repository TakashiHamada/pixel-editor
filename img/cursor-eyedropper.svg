<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Shadow -->
  <g transform="translate(1,1)" opacity="0.4">
    <rect x="3" y="22" width="4" height="4" rx="1" fill="#000"/>
    <line x1="7" y1="22" x2="17" y2="12" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <rect x="17" y="5" width="8" height="10" rx="1" transform="rotate(45 21 10)" fill="#000"/>
    <circle cx="24" cy="4" r="3" fill="#000"/>
  </g>
  <!-- Eyedropper body -->
  <rect x="3" y="22" width="4" height="4" rx="1" fill="#fff"/>
  <line x1="7" y1="22" x2="17" y2="12" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="7" y1="22" x2="17" y2="12" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="17" y="5" width="8" height="10" rx="1" transform="rotate(45 21 10)" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <circle cx="24" cy="4" r="3" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <!-- Tip -->
  <rect x="3.5" y="22.5" width="3" height="3" rx="0.5" fill="#e44"/>
  <!-- Hotspot indicator -->
  <circle cx="3" cy="26" r="1" fill="#fff" opacity="0"/>
</svg>
