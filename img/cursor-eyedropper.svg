<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Photoshop-style eyedropper / pipette -->
  <!-- Shadow layer -->
  <g transform="translate(0.8, 0.8)" opacity="0.35">
    <!-- Tip -->
    <path d="M2 30 L5 24 L8 27 Z" fill="#000"/>
    <!-- Barrel -->
    <rect x="7" y="14" width="5" height="14" rx="1" transform="rotate(-45 9.5 21)" fill="#000"/>
    <!-- Bulb -->
    <path d="M18.5 3.5 C18.5 1.5 21 0.5 23 1.5 L25 3 C26.5 4.5 26 7 24 7.5 L19.5 8.5 Z" fill="#000"/>
  </g>
  <!-- Main shape -->
  <!-- Tip (colored) -->
  <path d="M2 30 L5 24 L8 27 Z" fill="#e44" stroke="#222" stroke-width="0.8"/>
  <!-- Barrel -->
  <rect x="7" y="14" width="5" height="14" rx="1" transform="rotate(-45 9.5 21)" fill="#fff" stroke="#222" stroke-width="1"/>
  <!-- Ring detail -->
  <line x1="13" y1="15.5" x2="16.5" y2="12" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bulb top -->
  <path d="M18.5 3.5 C18.5 1.5 21 0.5 23 1.5 L25 3 C26.5 4.5 26 7 24 7.5 L19.5 8.5 Z" fill="#fff" stroke="#222" stroke-width="1"/>
  <!-- Bulb highlight -->
  <ellipse cx="22" cy="4" rx="1.5" ry="1" fill="#ddd" opacity="0.6" transform="rotate(-40 22 4)"/>
</svg>
